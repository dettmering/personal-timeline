services:
  timeline:
    build: .
    image: personal-timeline:latest
    container_name: personal-timeline
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - timeline-data:/data
      - /opt/secrets/timeline-encryption-key.txt:/run/secrets/timeline_encryption_key:ro
    environment:
      TZ: Europe/Berlin

volumes:
  timeline-data:
