<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Timeline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,400;0,600;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <nav class="day-nav" id="dayNav">
      <button id="prevDay" type="button" aria-label="Vorheriger Tag">&larr;</button>
      <div class="day-center">
        <span id="dayLabel">Heute</span>
        <div class="day-controls">
          <button id="sealBadge" type="button" class="seal-badge hidden" title="Tag ist versiegelt" aria-label="Details zur Versiegelung anzeigen"></button>
          <input type="date" id="datePicker">
          <button id="todayBtn" type="button">Heute</button>
        </div>
      </div>
      <button id="nextDay" type="button" aria-label="Nächster Tag">&rarr;</button>
    </nav>

    <section class="filter-banner hidden" id="filterBanner">
      <span>Gefiltert nach <strong id="filterTag"></strong></span>
      <button id="clearFilter" type="button">Filter entfernen</button>
    </section>

    <section class="composer" id="composer">
      <textarea id="text" maxlength="1000" placeholder="Was machst du gerade? (#hashtags und @verweise werden erkannt)"></textarea>
      <div class="composer-row">
        <span id="charCount" class="char-count">0 / 1000</span>
        <button id="postBtn" type="button">Eintrag posten</button>
      </div>
    </section>

    <section class="timeline" id="timeline"></section>
    <p class="empty hidden" id="emptyState">Keine Einträge an diesem Tag.</p>
  </main>

  <dialog id="sealDialog" class="seal-dialog">
    <form method="dialog">
      <h2>Tagesversiegelung</h2>
      <dl class="seal-details">
        <dt>Status</dt><dd id="sealStatus"></dd>
        <dt>Datum</dt><dd id="sealDate"></dd>
        <dt>Einträge</dt><dd id="sealCount"></dd>
        <dt>Versiegelt am</dt><dd id="sealedAt"></dd>
        <dt>Seal-Hash</dt><dd><code id="sealHash"></code></dd>
        <dt>Zeitstempel</dt><dd id="sealOTS"></dd>
      </dl>
      <div class="dialog-buttons">
        <a id="sealProofLink" href="#" download>Proof herunterladen (.ots)</a>
        <button value="close" type="submit" class="primary">Schließen</button>
      </div>
    </form>
  </dialog>

  <dialog id="editDialog">
    <form id="editForm" method="dialog">
      <h2>Eintrag bearbeiten</h2>
      <textarea id="editText" maxlength="1000"></textarea>
      <div class="composer-row">
        <span id="editCharCount" class="char-count">0 / 1000</span>
        <div class="dialog-buttons">
          <button value="cancel" type="submit">Abbrechen</button>
          <button value="save" type="submit" class="primary">Speichern</button>
        </div>
      </div>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
